<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urgent Heelers — No Heeler Left Behind</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #222; }
  header { background: #0099cc; color: white; padding: 20px 24px; text-align: center; }
  header h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; }
  header p { font-size: 0.9rem; opacity: 0.85; margin-top: 4px; }
  .filters { background: white; padding: 14px 20px; display: flex; flex-wrap: wrap; gap: 10px; border-bottom: 1px solid #e0e0e0; position: sticky; top: 0; z-index: 10; }
  .filters input, .filters select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; flex: 1; min-width: 140px; }
  .filters input:focus, .filters select:focus { outline: none; border-color: #0099cc; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; padding: 20px; max-width: 1200px; margin: 0 auto; }
  .card { background: white; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: transform 0.15s, box-shadow 0.15s; cursor: pointer; }
  .card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.13); }
  .card-img { width: 100%; height: 200px; background: #e8f4f8; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 0.85rem; overflow: hidden; }
  .card-img img { width: 100%; height: 200px; object-fit: cover; }
  .card-body { padding: 14px; }
  .urgent-badge { display: inline-block; background: #e74c3c; color: white; font-size: 0.7rem; font-weight: 700; padding: 3px 8px; border-radius: 20px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .card-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
  .card-meta { font-size: 0.82rem; color: #666; margin-bottom: 6px; line-height: 1.5; }
  .card-id { font-size: 0.78rem; color: #999; font-family: monospace; margin-bottom: 8px; }
  .card-notes { font-size: 0.8rem; color: #444; background: #f0f8ff; border-left: 3px solid #0099cc; padding: 6px 10px; border-radius: 0 6px 6px 0; margin-bottom: 10px; line-height: 1.4; }
  .read-more { font-size: 0.78rem; color: #0099cc; font-weight: 600; margin-bottom: 10px; cursor: pointer; display: inline-block; }
  .share-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .share-btn { display: inline-flex; align-items: center; gap: 4px; padding: 5px 9px; border-radius: 8px; font-size: 0.72rem; font-weight: 600; text-decoration: none; border: none; cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
  .share-btn:hover { opacity: 0.82; }
  .btn-x { background: #000; color: white; }
  .btn-fb { background: #1877f2; color: white; }
  .btn-reddit { background: #ff4500; color: white; }
  .btn-email { background: #6c757d; color: white; }
  .btn-text { background: #28a745; color: white; }
  .btn-pin { background: #e60023; color: white; }
  .btn-ig { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); color: white; }
  .no-results { text-align: center; padding: 60px 20px; color: #999; grid-column: 1/-1; }
  .count { padding: 10px 20px; font-size: 0.85rem; color: #666; max-width: 1200px; margin: 0 auto; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 18px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; }
  .modal-img { width: 100%; height: 260px; background: #e8f4f8; display: flex; align-items: center; justify-content: center; color: #aaa; border-radius: 18px 18px 0 0; overflow: hidden; }
  .modal-img img { width: 100%; height: 260px; object-fit: cover; border-radius: 18px 18px 0 0; }
  .modal-body { padding: 20px; }
  .modal-name { font-size: 1.4rem; font-weight: 800; margin-bottom: 6px; }
  .modal-detail { font-size: 0.9rem; color: #444; line-height: 1.7; margin-bottom: 12px; }
  .modal-detail strong { color: #222; }
  .modal-notes-block { margin: 12px 0; }
  .modal-notes-block h4 { font-size: 0.78rem; font-weight: 700; color: #0099cc; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .modal-notes-block p { font-size: 0.88rem; color: #444; background: #f0f8ff; border-left: 3px solid #0099cc; padding: 8px 12px; border-radius: 0 6px 6px 0; line-height: 1.5; }
  .modal-share { margin-top: 16px; }
  .modal-share h3 { font-size: 0.85rem; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .modal-share-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .modal-share-row .share-btn { padding: 10px 14px; font-size: 0.85rem; }
  .modal-close { float: right; background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #999; margin-top: -4px; }
  footer { text-align: center; padding: 30px 20px; font-size: 0.8rem; color: #aaa; }
  footer a { color: #0099cc; text-decoration: none; }
</style>
</head>
<body>

<header>
  <h1>🐾 Urgent Heelers</h1>
  <p>Australian Cattle Dogs &amp; mixes facing euthanasia — help them find fosters &amp; rescues</p>
</header>

<div class="filters">
  <input type="text" id="search" placeholder="🔍 Search by name, ID, city..." oninput="filterDogs()">
  <select id="stateFilter" onchange="filterDogs()">
    <option value="">All States</option>
    <option value="CA">California</option>
    <option value="TX">Texas</option>
    <option value="OK">Oklahoma</option>
  </select>
  <select id="urgencyFilter" onchange="filterDogs()">
    <option value="">All Urgency</option>
    <option value="urgent">Urgent Only</option>
  </select>
</div>

<div class="count" id="count"></div>
<div class="grid" id="grid"></div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <div id="modalImg" class="modal-img"></div>
    <div class="modal-body">
      <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">✕</button>
      <div class="modal-name" id="modalName"></div>
      <div class="modal-detail" id="modalDetail"></div>
      <div id="modalNotes"></div>
      <div class="modal-share">
        <h3>Share to help this dog</h3>
        <div class="modal-share-row" id="modalShare"></div>
      </div>
    </div>
  </div>
</div>

<footer>
  Built by <a href="https://noheelerleftbehind.org" target="_blank">No Heeler Left Behind</a> · Updated daily · <a href="https://docs.google.com/spreadsheets/d/1k16DDd5JrVbb4mHI1fgsQnHY47RPffb9nhLoTIoCa8o" target="_blank">View full sheet</a>
</footer>

<script>
const dogs = [
  { name: "Unnamed", urgency: "Urgent - Can be PTS after 06/23", id: "A551901", city: "Moreno Valley", state: "CA", shelter: "Moreno Valley Animal Services", sourceLink: "https://post.rescueme.org/26-06-16-00022", igLink: "", photo: "https://raw.githubusercontent.com/NoHeelerleftbehind/UrgentHeelers/main/photos/A551901.jpg", tempNotes: "", medNotes: "" },
  { name: "The King", urgency: "Urgent - 72hr", id: "A5784245", city: "Palmdale", state: "CA", shelter: "Palmdale Animal Shelter (LA County)", sourceLink: "https://post.rescueme.org/26-06-16-00022", igLink: "https://www.instagram.com/p/DaBatCYPwrX/", photo: "https://raw.githubusercontent.com/noheelerleftbehind/UrgentHeelers/main/photos/A5784245.jpg", tempNotes: "", medNotes: "" },
  { name: "Pink", urgency: "", id: "A5783218", city: "Palmdale", state: "CA", shelter: "Palmdale Animal Care Center", sourceLink: "", igLink: "https://www.instagram.com/p/DZ-tB6unUUE/", photo: "https://raw.githubusercontent.com/NoHeelerleftbehind/UrgentHeelers/main/photos/A5783218.jpg", tempNotes: "", medNotes: "" },
  { name: "Mickey", urgency: "", id: "A845464", city: "San Bernardino", state: "CA", shelter: "Devore Animal Shelter", sourceLink: "", igLink: "https://www.instagram.com/p/DZ6Mz6ajBDD/", photo: "https://raw.githubusercontent.com/NoHeelerleftbehind/UrgentHeelers/main/photos/A845464.jpg", tempNotes: "", medNotes: "" },
  { name: "Gracie, Kitana, Reese", urgency: "", id: "A831945, A831946, A845334", city: "San Bernardino", state: "CA", shelter: "Devore Animal Shelter", sourceLink: "", igLink: "https://www.instagram.com/p/DZ79ubwDjFz/", photo: "https://raw.githubusercontent.com/NoHeelerleftbehind/UrgentHeelers/main/photos/A831945.jpg", tempNotes: "", medNotes: "" },
  { name: "Ghost", urgency: "Urgent - 72hr", id: "A5782953", city: "Palmdale", state: "CA", shelter: "Palmdale Animal Care Center", sourceLink: "", igLink: "https://www.instagram.com/p/DaCSl60DdlN/", photo: "https://raw.githubusercontent.com/NoHeelerleftbehind/UrgentHeelers/main/photos/A5782953.jpg", tempNotes: "", medNotes: "" },
  { name: "Robin", urgency: "", id: "A5780824", city: "Lancaster", state: "CA", shelter: "Lancaster Animal Care Center", sourceLink: "", igLink: "https://www.instagram.com/p/DZtdeS-BjTO/", photo: "https://raw.githubusercontent.com/NoHeelerleftbehind/UrgentHeelers/main/photos/A5780824.jpg", tempNotes: "", medNotes: "" },
  { name: "Unnamed (Downey)", urgency: "", id: "26-11905", city: "Downey", state: "CA", shelter: "Downey Animal Care Center", sourceLink: "", igLink: "https://www.instagram.com/p/DZp2MYFjW4a/", photo: "https://raw.githubusercontent.com/NoHeelerleftbehind/UrgentHeelers/main/photos/26-11905.jpg", tempNotes: "", medNotes: "" },
  { name: "Pawlie", urgency: "", id: "A5780493", city: "Palmdale", state: "CA", shelter: "Palmdale Animal Care Center", sourceLink: "", igLink: "https://www.instagram.com/p/DZrFDarB0oH/", photo: "https://raw.githubusercontent.com/NoHeelerleftbehind/UrgentHeelers/main/photos/A5780493.jpg", tempNotes: "", medNotes: "" },
  { name: "Miller", urgency: "", id: "A845503", city: "San Bernardino", state: "CA", shelter: "Devore Animal Shelter", sourceLink: "", igLink: "https://www.instagram.com/p/DZ5eUSPnYOF/", photo: "https://raw.githubusercontent.com/NoHeelerleftbehind/UrgentHeelers/main/photos/A845503.jpg", tempNotes: "", medNotes: "" },
  { name: "Coco", urgency: "", id: "A5780758", city: "Lancaster", state: "CA", shelter: "Lancaster Animal Care Center", sourceLink: "", igLink: "https://www.instagram.com/p/DZohnkRBLw6/", photo: "https://raw.githubusercontent.com/NoHeelerleftbehind/UrgentHeelers/main/photos/A5780758.jpg", tempNotes: "", medNotes: "" },
  { name: "Jell-O", urgency: "", id: "A844535", city: "San Bernardino", state: "CA", shelter: "Devore Animal Shelter", sourceLink: "", igLink: "https://www.instagram.com/p/DZ1oR2Bvx9u/", photo: "https://raw.githubusercontent.com/NoHeelerleftbehind/UrgentHeelers/main/photos/A844535.jpg", tempNotes: "", medNotes: "" },
  { name: "Domino & Bearson", urgency: "", id: "A5779350, A5779348", city: "Palmdale", state: "CA", shelter: "Palmdale Animal Care Center", sourceLink: "", igLink: "https://www.instagram.com/p/DZlodYuJCmE/", photo: "https://raw.githubusercontent.com/NoHeelerleftbehind/UrgentHeelers/main/photos/A5779350.jpg", tempNotes: "", medNotes: "" },
  { name: "Darwin", urgency: "", id: "A594654", city: "San Bernardino", state: "CA", shelter: "ARC / East Valley Shelter", sourceLink: "", igLink: "https://www.instagram.com/p/DaBa1Y7yNJy/", photo: "https://raw.githubusercontent.com/NoHeelerleftbehind/UrgentHeelers/main/photos/A594654.jpg", tempNotes: "", medNotes: "" }
];

function isUrgent(dog) {
  return dog.urgency && dog.urgency.toLowerCase().includes('urgent');
}

function getShareText(dog) {
  const urgentTag = isUrgent(dog) ? '🚨 URGENT ' : '';
  const name = dog.name && !dog.name.toLowerCase().includes('unnamed') ? dog.name + ' · ' : '';
  return encodeURIComponent(urgentTag + name + dog.id + ' · ' + dog.city + ', ' + dog.state + ' · ' + dog.shelter + ' · ACD/Heeler mix needs rescue NOW #SaveAHeeler #AustralianCattleDog');
}

function getPageUrl() {
  return encodeURIComponent(window.location.href);
}

function shareButtons(dog) {
  const text = getShareText(dog);
  const url = getPageUrl();
  const igLink = dog.igLink || '';
  return `
    <a class="share-btn btn-x" href="https://twitter.com/intent/tweet?text=${text}&url=${url}" target="_blank" rel="noopener">𝕏 Post</a>
    <a class="share-btn btn-fb" href="https://www.facebook.com/sharer/sharer.php?u=${url}&quote=${text}" target="_blank" rel="noopener">FB</a>
    <a class="share-btn btn-reddit" href="https://www.reddit.com/submit?url=${url}&title=${text}" target="_blank" rel="noopener">Reddit</a>
    <a class="share-btn btn-pin" href="https://pinterest.com/pin/create/button/?url=${url}&description=${text}" target="_blank" rel="noopener">📌 Pin</a>
    <a class="share-btn btn-email" href="mailto:?subject=Urgent%20Dog%20Needs%20Help&body=${text}%20${url}" target="_blank" rel="noopener">✉ Email</a>
    <a class="share-btn btn-text" href="sms:?&body=${decodeURIComponent(text)}%20${decodeURIComponent(url)}" target="_blank" rel="noopener">💬 Text</a>
    ${igLink ? `<a class="share-btn btn-ig" href="${igLink}" target="_blank" rel="noopener">📸 IG</a>` : ''}
  `;
}

function renderCards(list) {
  const grid = document.getElementById('grid');
  document.getElementById('count').textContent = list.length + ' dog' + (list.length !== 1 ? 's' : '') + ' listed';
  if (list.length === 0) {
    grid.innerHTML = '<div class="no-results">No dogs match your search.</div>';
    return;
  }
  grid.innerHTML = list.map((dog, i) => {
    const urgent = isUrgent(dog);
    const imgHtml = dog.photo
      ? `<div class="card-img"><img src="${dog.photo}" alt="${dog.name}" onerror="this.parentElement.innerHTML='<span>🐾 No photo</span>'"></div>`
      : dog.igLink
        ? `<div class="card-img"><a href="${dog.igLink}" target="_blank" rel="noopener" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#0099cc;text-decoration:none;gap:6px"><svg xmlns='http://www.w3.org/2000/svg' width='36' height='36' viewBox='0 0 24 24' fill='none' stroke='#0099cc' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><rect x='2' y='2' width='20' height='20' rx='5' ry='5'/><path d='M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z'/><line x1='17.5' y1='6.5' x2='17.51' y2='6.5'/></svg><span style='font-size:0.75rem;font-weight:600'>📷 View on Instagram</span></a></div>`
        : `<div class="card-img"><span>🐾 No photo yet</span></div>`;
    const hasNotes = dog.tempNotes || dog.medNotes;
    const notesPreview = hasNotes
      ? `<div class="card-notes">${[dog.tempNotes, dog.medNotes].filter(Boolean).join(' · ')}</div>`
      : '';
    return `
      <div class="card" onclick="openModal(${i})">
        ${imgHtml}
        <div class="card-body">
          ${urgent ? '<span class="urgent-badge">⚠ Urgent</span>' : ''}
          <div class="card-name">${dog.name}</div>
          <div class="card-meta">${dog.city}, ${dog.state} · ${dog.shelter}</div>
          ${dog.urgency ? `<div class="card-meta" style="color:#e74c3c;font-weight:600">${dog.urgency}</div>` : ''}
          <div class="card-id">ID: ${dog.id}</div>
          ${notesPreview}
          <span class="read-more">Read more →</span>
          <div class="share-row">${shareButtons(dog)}</div>
        </div>
      </div>
    `;
  }).join('');
}

let filtered = [...dogs];

function filterDogs() {
  const search = document.getElementById('search').value.toLowerCase();
  const state = document.getElementById('stateFilter').value;
  const urgency = document.getElementById('urgencyFilter').value;
  filtered = dogs.filter(d => {
    const matchSearch = !search || [d.name, d.id, d.city, d.shelter].some(f => f && f.toLowerCase().includes(search));
    const matchState = !state || d.state === state;
    const matchUrgency = !urgency || (urgency === 'urgent' && isUrgent(d));
    return matchSearch && matchState && matchUrgency;
  });
  renderCards(filtered);
}

function openModal(idx) {
  const dog = filtered[idx];
  const urgent = isUrgent(dog);

  document.getElementById('modalName').innerHTML = (urgent ? '<span class="urgent-badge">⚠ Urgent</span><br>' : '') + dog.name;

  document.getElementById('modalDetail').innerHTML = `
    <strong>Shelter ID:</strong> ${dog.id}<br>
    <strong>Location:</strong> ${dog.city}, ${dog.state}<br>
    <strong>Shelter:</strong> ${dog.shelter}<br>
    ${dog.urgency ? `<strong style="color:#e74c3c">Status:</strong> <span style="color:#e74c3c">${dog.urgency}</span><br>` : ''}
    ${dog.sourceLink ? `<strong>Listing:</strong> <a href="${dog.sourceLink}" target="_blank">View source</a><br>` : ''}
    ${dog.igLink ? `<strong>IG Thread:</strong> <a href="${dog.igLink}" target="_blank">View networking post</a><br>` : ''}
  `;

  let notesHtml = '';
  if (dog.tempNotes) notesHtml += `<div class="modal-notes-block"><h4>🐕 Temperament</h4><p>${dog.tempNotes}</p></div>`;
  if (dog.medNotes) notesHtml += `<div class="modal-notes-block"><h4>🏥 Medical</h4><p>${dog.medNotes}</p></div>`;
  document.getElementById('modalNotes').innerHTML = notesHtml;

  const imgEl = document.getElementById('modalImg');
  imgEl.innerHTML = dog.photo
    ? `<img src="photos/${dog.photo}" alt="${dog.name}">`
    : `<span style="padding:20px;color:#aaa">🐾 No photo yet</span>`;

  document.getElementById('modalShare').innerHTML = shareButtons(dog);
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
  }
}

dogs.sort((a, b) => (isUrgent(b) ? 1 : 0) - (isUrgent(a) ? 1 : 0));
renderCards(dogs);
filtered = [...dogs];
</script>
</body>
</html>
