name: Rebuild Site from Sheet

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Rebuild site from Google Sheet CSV
        run: node scripts/rebuild.js
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html dogs/ photos/
          git diff --staged --quiet || git commit -m "Auto-rebuild from sheet [skip ci]"
          git push
